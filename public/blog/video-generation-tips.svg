<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#12121a"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <radialGradient id="glow1" cx="70%" cy="60%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <!-- Film reel motif -->
  <circle cx="980" cy="280" r="100" stroke="#d97706" stroke-width="2" fill="none" opacity="0.12"/>
  <circle cx="980" cy="280" r="30" fill="#d97706" opacity="0.08"/>
  <!-- Reel spokes -->
  <line x1="980" y1="180" x2="980" y2="200" stroke="#d97706" stroke-width="2" opacity="0.1"/>
  <line x1="980" y1="360" x2="980" y2="380" stroke="#d97706" stroke-width="2" opacity="0.1"/>
  <line x1="880" y1="280" x2="900" y2="280" stroke="#d97706" stroke-width="2" opacity="0.1"/>
  <line x1="1060" y1="280" x2="1080" y2="280" stroke="#d97706" stroke-width="2" opacity="0.1"/>
  <!-- Film strip -->
  <rect x="1100" y="150" width="30" height="330" rx="4" stroke="#d97706" stroke-width="1.5" fill="none" opacity="0.1"/>
  <rect x="1106" y="170" width="8" height="8" rx="1" fill="#d97706" opacity="0.08"/>
  <rect x="1106" y="200" width="8" height="8" rx="1" fill="#d97706" opacity="0.08"/>
  <rect x="1106" y="230" width="8" height="8" rx="1" fill="#d97706" opacity="0.08"/>
  <rect x="1106" y="260" width="8" height="8" rx="1" fill="#d97706" opacity="0.08"/>
  <rect x="1106" y="290" width="8" height="8" rx="1" fill="#d97706" opacity="0.08"/>
  <rect x="1106" y="320" width="8" height="8" rx="1" fill="#d97706" opacity="0.08"/>
  <!-- Play button -->
  <circle cx="980" cy="280" r="50" stroke="#06b6d4" stroke-width="2" fill="#06b6d4" fill-opacity="0.05" opacity="0.2"/>
  <path d="M965 255 L1005 280 L965 305 Z" fill="#06b6d4" opacity="0.15"/>
  <!-- Sparkles -->
  <circle cx="200" cy="120" r="3" fill="#f59e0b" opacity="0.3"/>
  <circle cx="450" cy="160" r="2" fill="#06b6d4" opacity="0.2"/>
  <circle cx="700" cy="100" r="2.5" fill="#ec4899" opacity="0.15"/>
  <!-- Badge -->
  <rect x="80" y="180" width="110" height="32" rx="16" fill="#3b82f6" opacity="0.15"/>
  <text x="135" y="201" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#60a5fa" text-anchor="middle">TUTORIAL</text>
  <!-- Title -->
  <text x="80" y="268" font-family="Inter, system-ui, sans-serif" font-size="40" font-weight="800" fill="white">5 Tips for Stunning</text>
  <text x="80" y="320" font-family="Inter, system-ui, sans-serif" font-size="40" font-weight="800" fill="url(#amber)">AI Video Generation</text>
  <!-- Subtitle -->
  <text x="80" y="375" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#9ca3af">Camera movements, model selection, and cinematic prompts.</text>
  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#f59e0b" opacity="0.08"/>
  <text x="80" y="616" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#d97706">tynkerlab.ai</text>
  <text x="1120" y="616" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6b7280" text-anchor="end">Feb 20, 2026</text>
</svg>
