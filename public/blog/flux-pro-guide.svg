  <rect x="80" y="410" width="120" height="28" rx="14" fill="#f59e0b" opacity="0.1"/>
  <text x="140" y="429" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#fbbf24" text-anchor="middle">Style Tips</text>
  <rect x="215" y="410" width="140" height="28" rx="14" fill="#06b6d4" opacity="0.1"/>
  <text x="285" y="429" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#22d3ee" text-anchor="middle">Composition</text>
