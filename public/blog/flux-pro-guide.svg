  <text x="80" y="268" font-family="Inter, system-ui, sans-serif" font-size="40" font-weight="800" fill="white">Getting the Best Results</text>
  <text x="80" y="320" font-family="Inter, system-ui, sans-serif" font-size="40" font-weight="800" fill="url(#amber)">with FLUX Pro Models</text>
  <!-- Subtitle -->
  <text x="80" y="375" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#9ca3af">Prompt engineering techniques to unlock maximum quality.</text>
